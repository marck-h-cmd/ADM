version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tenebrosa_mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "StrongPassword123!"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - tenebrosa_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P StrongPassword123! -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: tenebrosa_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mssql
      DB_PORT: 1433
      DB_NAME: tenebrosa
      DB_USER: sa
      DB_PASSWORD: StrongPassword123!
      JWT_SECRET: ${JWT_SECRET:-mi_secreto_super_seguro_para_jwt_2024}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173,http://localhost:3000
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ../frontend/init.sql:/app/init.sql
    networks:
      - tenebrosa_network

volumes:
  mssql_data:
    name: tenebrosa_mssql_data

networks:
  tenebrosa_network:
    name: tenebrosa_network
    driver: bridge