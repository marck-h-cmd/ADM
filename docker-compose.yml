services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tenebrosa-frontend
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3000/api
    depends_on:
      - backend
    networks:
      - tenebrosa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenebrosa-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=mssql
      - DB_PORT=1433
      - DB_NAME=tenebrosa
      - DB_USER=sa
      - DB_PASSWORD=StrongPassword123!
      - JWT_SECRET=${JWT_SECRET:-mi_secreto_super_seguro_para_jwt_2024}
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:8080,http://localhost:3000
    depends_on:
      mssql:
        condition: service_healthy
    volumes:
      - ./frontend/init.sql:/app/init.sql
    networks:
      - tenebrosa-network
    restart: unless-stopped

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tenebrosa-mssql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=StrongPassword123!
      - MSSQL_PID=Developer
    ports:
      - "14333:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - tenebrosa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P StrongPassword123! -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  tenebrosa-network:
    driver: bridge

volumes:
  mssql_data:
