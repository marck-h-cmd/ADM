services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tenebrosa-frontend-pg2
    ports:
      - "8082:80"
      - "8443:443"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:3000/api
    depends_on:
      - backend
    networks:
      - tenebrosa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenebrosa-backend-pg2
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=tenebrosa
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=${JWT_SECRET:-mi_secreto_super_seguro_para_jwt_2024}
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:8082,http://localhost:3002
    depends_on:
      - postgres
    networks:
      - tenebrosa-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: tenebrosa-postgres-pg2
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tenebrosa
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./frontend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tenebrosa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: tenebrosa-pgadmin2
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5052:80"
    depends_on:
      - postgres
    networks:
      - tenebrosa-network
    restart: unless-stopped

networks:
  tenebrosa-network:
    driver: bridge

volumes:
  postgres_data:
